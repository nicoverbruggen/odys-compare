<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>OpenDyslexic comparison</title>
<style>
  @font-face { font-family: "OD-A"; src: url("fonts/A/A-Regular.ttf");    font-weight: 400; font-style: normal; }
  @font-face { font-family: "OD-A"; src: url("fonts/A/A-Italic.ttf");     font-weight: 400; font-style: italic; }
  @font-face { font-family: "OD-A"; src: url("fonts/A/A-Bold.ttf");       font-weight: 700; font-style: normal; }
  @font-face { font-family: "OD-A"; src: url("fonts/A/A-BoldItalic.ttf"); font-weight: 700; font-style: italic; }
  @font-face { font-family: "OD-B"; src: url("fonts/B/B-Regular.ttf");    font-weight: 400; font-style: normal; }
  @font-face { font-family: "OD-B"; src: url("fonts/B/B-Italic.ttf");     font-weight: 400; font-style: italic; }
  @font-face { font-family: "OD-B"; src: url("fonts/B/B-Bold.ttf");       font-weight: 700; font-style: normal; }
  @font-face { font-family: "OD-B"; src: url("fonts/B/B-BoldItalic.ttf"); font-weight: 700; font-style: italic; }
  @font-face { font-family: "OD-M"; src: url("fonts/M/M-Regular.otf");    font-weight: 400; font-style: normal; }
  @font-face { font-family: "OD-M"; src: url("fonts/M/M-Italic.otf");     font-weight: 400; font-style: italic; }
  @font-face { font-family: "OD-M"; src: url("fonts/M/M-Bold.otf");       font-weight: 700; font-style: normal; }
  @font-face { font-family: "OD-M"; src: url("fonts/M/M-BoldItalic.otf"); font-weight: 700; font-style: italic; }
  @font-face { font-family: "OD-MT"; src: url("fonts/MT/MT-Regular.otf");    font-weight: 400; font-style: normal; }
  @font-face { font-family: "OD-MT"; src: url("fonts/MT/MT-Italic.otf");     font-weight: 400; font-style: italic; }
  @font-face { font-family: "OD-MT"; src: url("fonts/MT/MT-Bold.otf");       font-weight: 700; font-style: normal; }
  @font-face { font-family: "OD-MT"; src: url("fonts/MT/MT-BoldItalic.otf"); font-weight: 700; font-style: italic; }
  @font-face { font-family: "OD-T"; src: url("fonts/T/T-Regular.otf");    font-weight: 400; font-style: normal; }
  @font-face { font-family: "OD-T"; src: url("fonts/T/T-Italic.otf");     font-weight: 400; font-style: italic; }
  @font-face { font-family: "OD-T"; src: url("fonts/T/T-Bold.otf");       font-weight: 700; font-style: normal; }
  @font-face { font-family: "OD-T"; src: url("fonts/T/T-BoldItalic.otf"); font-weight: 700; font-style: italic; }
  @font-face { font-family: "OD-UT"; src: url("fonts/UT/UT-Regular.otf");    font-weight: 400; font-style: normal; }
  @font-face { font-family: "OD-UT"; src: url("fonts/UT/UT-Italic.otf");     font-weight: 400; font-style: italic; }
  @font-face { font-family: "OD-UT"; src: url("fonts/UT/UT-Bold.otf");       font-weight: 700; font-style: normal; }
  @font-face { font-family: "OD-UT"; src: url("fonts/UT/UT-BoldItalic.otf"); font-weight: 700; font-style: italic; }

  :root {
    --paper: #f4ecd8;
    --ink: #2b2a27;
    --muted: #6b6152;
    --accent: #8a5a3b;
    --shadow: 0 6px 30px rgba(0,0,0,.18), 0 2px 6px rgba(0,0,0,.12);
  }
  html, body { margin: 0; padding: 0; background: #2a2622; color: var(--ink); }
  body { font-family: system-ui, sans-serif; min-height: 100vh; }

  .toolbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    padding: 10px 14px; background: rgba(20,18,16,.92); color: #e8dfcd;
    border-bottom: 1px solid #000; backdrop-filter: blur(6px);
  }
  .toolbar-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: center; }
  .toolbar button, .toolbar label {
    font: 500 13px/1.2 system-ui, sans-serif;
    background: #3a342d; color: #e8dfcd; border: 1px solid #554c40;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .toolbar input[type=range] { vertical-align: middle; }
  .toolbar input[type=checkbox] { margin: 0; vertical-align: middle; }
  .toolbar select { background: #2a2622; color: #e8dfcd; border: 1px solid #554c40; border-radius: 4px; padding: 2px 4px; font: inherit; }
  .toolbar button.active { background: #8a5a3b; border-color: #b57a55; color: #fff; }
  .toolbar .sep { width: 1px; background: #554c40; height: 22px; }
  .toolbar .group-label { font: 500 11px/1 system-ui, sans-serif; letter-spacing: .15em; text-transform: uppercase; color: #8f8470; padding: 0 4px; }
  .toolbar input[type=range] { width: 140px; }
  .kbd { font: 12px ui-monospace, monospace; opacity: .65; margin-left: 4px; }

  .reader {
    max-width: 720px; margin: 40px auto; padding: 64px 72px;
    background: var(--paper); border-radius: 2px; box-shadow: var(--shadow);
    min-height: calc(100vh - 160px);
    font-family: "OD-A", sans-serif;
    font-size: 20px; line-height: 1.55;
    font-feature-settings: "kern" 1; text-rendering: optimizeLegibility;
  }
  .reader.B { font-family: "OD-B", sans-serif; }
  .reader.M { font-family: "OD-M", sans-serif; }
  .reader.MT { font-family: "OD-MT", sans-serif; }
  .reader.T { font-family: "OD-T", sans-serif; }
  .reader.UT { font-family: "OD-UT", sans-serif; }

  .chapter-num { font-size: 12px; letter-spacing: .25em; color: var(--muted); text-transform: uppercase; }
  h1 { font-size: 32px; margin: 6px 0 28px; font-weight: 700; line-height: 1.15; }
  h2 { font-size: 22px; margin: 32px 0 12px; font-weight: 700; }
  p { margin: 0 0 1em; text-align: left; hyphens: auto; }
  .reader.justify p { text-align: justify; }
  .chapter-num .num { display: inline-block; margin-left: 0.35em; }
  .appendix-page h2 { border-top: 2px solid #d8cfb8; padding-top: 0.7em; margin-top: 2em; }
  .appendix-page h3 { font-size: 13px; letter-spacing: .08em; text-transform: uppercase; margin: 1.2em 0 0.35em; color: var(--muted); }
  .appendix-page .pair-test,
  .appendix-page .kern-grid,
  .appendix-page blockquote,
  .appendix-page .poem,
  .appendix-page .dialogue-sample { padding: 0.8em 0.9em; border: 1px solid #d8cfb8; border-left-width: 3px; margin: 0.6em 0 1.2em; }
  .appendix-page blockquote { font-style: normal; }
  .poem .line { margin: 0; text-indent: 0; }
  .poem-title { font-style: italic; font-weight: normal; font-size: 1em; margin: 1.6em 0 .6em; }
  .chapter-nav {
    max-width: 720px; margin: 16px auto 0; padding: 14px 72px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    color: #d6ccb6; font: 14px/1.3 system-ui, sans-serif;
  }
  .chapter-nav button {
    font: inherit; background: #3a342d; color: #e8dfcd;
    border: 1px solid #554c40; border-radius: 6px;
    padding: 8px 14px; cursor: pointer;
  }
  .chapter-nav button:hover:not(:disabled) { background: #8a5a3b; border-color: #b57a55; color: #fff; }
  .chapter-nav button:disabled { opacity: .4; cursor: default; }
  .chapter-nav select { background: #2a2622; color: #e8dfcd; border: 1px solid #554c40; border-radius: 4px; padding: 4px 6px; font: inherit; }
  .chapter-nav label { display: inline-flex; align-items: center; gap: 8px; }
  .reader.body-italic p     { font-style: italic; }
  .reader.body-bold p       { font-weight: 700; }
  .reader.body-bolditalic p { font-style: italic; font-weight: 700; }
  p.lead::first-letter { font-size: 3.2em; float: left; line-height: .9; padding: 4px 8px 0 0; font-weight: 700; color: var(--accent); }
  em { font-style: italic; }
  strong { font-weight: 700; }
  blockquote { margin: 1.2em 0; padding: 0 1.2em; border-left: 3px solid var(--accent); color: #4a463e; font-style: italic; }
  .footer-meta { margin-top: 48px; color: var(--muted); font-size: 13px; text-align: center; border-top: 1px solid #d8cfb8; padding-top: 16px; }
  .pair-test { font-size: 28px; line-height: 1.5; letter-spacing: 0; }
  .pair-test span { display: inline-block; margin: 0 14px 8px 0; }

  .kern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; margin-top: 18px; }
  .kern-group { border-top: 1px solid #d8cfb8; padding-top: 10px; }
  .kern-label { font: 500 11px/1.4 system-ui, sans-serif; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .kern-row { font-size: 22px; line-height: 1.45; }

  .meta-pill { font: 11px ui-monospace, monospace; color: #c9bfa8; padding: 3px 8px; background: #3a342d; border-radius: 10px; border: 1px solid #554c40; }

  .description {
    max-width: 760px; margin: 20px auto 0; padding: 14px 20px;
    background: #1f1c19; color: #d6ccb6; border: 1px solid #3a342d;
    border-radius: 6px; font: 14px/1.55 system-ui, sans-serif;
  }
  .description h3 { margin: 0 0 4px; font-size: 15px; color: #f0e8d4; }
  .description .sub { color: #8f8470; font-size: 12px; margin-bottom: 8px; font-family: ui-monospace, monospace; }
  .description p { margin: 0; }
  .description a { color: #e0a878; text-decoration: underline; }
  .description a:hover { color: #f0c090; }

  .site-footer {
    max-width: 760px; margin: 24px auto 40px; padding: 16px 20px;
    color: #9a9074; font: 13px/1.6 system-ui, sans-serif; text-align: center;
  }
  .site-footer a { color: #e0a878; text-decoration: underline; }
  .site-footer a:hover { color: #f0c090; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-row">
    <span class="group-label">Tight</span>
    <button id="btnUT" class="active">UT ★<span class="kbd">[1]</span></button>
    <button id="btnT">T<span class="kbd">[2]</span></button>
    <div class="sep"></div>
    <span class="group-label">Classic</span>
    <button id="btnA">A<span class="kbd">[3]</span></button>
    <button id="btnB">B<span class="kbd">[4]</span></button>
    <div class="sep"></div>
    <span class="group-label">Mixed</span>
    <button id="btnM">M<span class="kbd">[5]</span></button>
    <button id="btnMT">MT<span class="kbd">[6]</span></button>
  </div>
  <div class="toolbar-row">
    <label>size <input id="size" type="range" min="14" max="28" value="20"></label>
    <label>line-height <input id="lh" type="range" min="120" max="200" value="155"></label>
    <label><input id="justify" type="checkbox" checked> justify</label>
    <label>body <select id="bodyStyle">
      <option value="regular">Regular</option>
      <option value="italic">Italic</option>
      <option value="bold">Bold</option>
      <option value="bolditalic">Bold Italic</option>
    </select></label>
    <div class="sep"></div>
    <span class="kbd" style="opacity:.55">space to toggle</span>
  </div>
</div>

<div class="description" id="desc"></div>

<article class="reader A" id="reader"></article>

<nav class="chapter-nav" id="chapterNav">
  <button id="prevCh" title="Previous chapter">&larr; Previous</button>
  <label>chapter <select id="chapter"></select></label>
  <button id="nextCh" title="Next chapter">Next &rarr;</button>
</nav>

<footer class="site-footer">
  <p>An experimental comparison to determine which version of OpenDyslexic to include in my curated font collection. Learn more about the curated collection and the rationale behind modifying OFL fonts at <a href="https://nicoverbruggen.be/fonts">nicoverbruggen.be/fonts</a>.</p>
</footer>

<script src="book.js"></script>
<script src="index.js"></script>
</body>
</html>
